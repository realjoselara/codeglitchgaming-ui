<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Super Bear - Tiny Pixel Game</title>
  <style>
    /* Minimal reset */
    html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#0b0f13;color:#ddd;font-family:monospace, system-ui,-apple-system,Segoe UI,Roboto,Arial;}

    /* Canvas container to keep centered */
    .game-wrap{box-shadow:0 6px 30px rgba(0,0,0,0.7);}

    canvas{
      /* internal resolution is 320x180; scale with integer factor for crisp pixels */
      width:960px; /* 3x scale */
      height:540px;
      image-rendering: pixelated; /* hint for crisp scaling */
      display:block;
      background: #081018; /* clean dark background */
      border: 6px solid #061018;
    }

    /* HUD text top-left */
    .hud{
      position: absolute;
      left: 12px;
      top: 12px;
      color: #f7f7f7;
      font-weight:700;
      text-shadow:0 1px 0 rgba(0,0,0,0.6);
      pointer-events:none;
    }

    /* small help text */
    .help{position:absolute;right:12px;top:12px;color:#9fb3c6;font-size:12px}
  </style>
</head>
<body>
  <div class="game-wrap" style="position:relative">
    <canvas id="game" width="320" height="180"></canvas>
  <div class="hud" id="hud" style="display:none">Health: 100   Coins: 0</div>
  <div class="help">WASD to move • F to shoot • J melee • B open shop</div>
  </div>

  <script>
  /* Simple single-file pixel game with melee combo (J)
     - Canvas rendering (320x180) scaled in CSS for crisp pixels
     - No external libs
  */

  // === Basic setup ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width;
  const H = canvas.height;
  // canvas ready
  const GROUND_H = 26;
  // prevent context menu on right click inside canvas
  canvas.addEventListener('contextmenu', (e)=>{ e.preventDefault(); });
  // track mouse position in canvas coordinates
  canvas.addEventListener('mousemove', (evt)=>{
    const rect = canvas.getBoundingClientRect();
    mouseX = (evt.clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (evt.clientY - rect.top) * (canvas.height / rect.height);
    // update player facing towards mouse
    const px = player.x + player.w/2;
    if(mouseX - px > 0) player.facing = 1; else player.facing = -1;
  });
  // mouse click handling: left = punch, right = shoot
  canvas.addEventListener('mousedown', (evt)=>{
    // if shop open, let existing shop click handler manage it
    if(shopOpen || paused || gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (evt.clientX - rect.left) * (canvas.width / rect.width);
    const my = (evt.clientY - rect.top) * (canvas.height / rect.height);
    // NOTE: left-click now shoots, right-click punches
    if(evt.button === 0){ // left click -> shoot
      if(shootCooldown <= 0){
        shootAt(mx, my);
        shootCooldown = 14; // ~233ms
      }
    } else if(evt.button === 2){ // right click -> punch
      if(punchCooldown <= 0){
        doMousePunch(mx, my);
        punchCooldown = 20; // ~333ms
      }
    }
  });
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  // === Player (Super Bear) ===
  const player = {
    x: W/2 - 10,
    y: H/2 - 12,
    w: 14,
    h: 24,
    baseSpeed: 1.7,
    speedBonus: 0,
    get speed(){ return this.baseSpeed + (this.speedBonus || 0); },
    vx:0, vy:0,
    health: 100,
    maxHealth: 100,
    attackBonus: 0,
    facing: 1,
    invuln: 0,
    // dodge state
    isDodging: false,
    dodgeTimer: 0,
    dodgeCooldown: 0,
    dodgeVx: 0,
    dodgeVy: 0,
    // last movement direction for dodge fallback
    lastMoveX: 1,
    lastMoveY: 0
  };

  // === Controls ===
  const keys = {};
  window.addEventListener('keydown', (e)=>{
    keys[e.key.toLowerCase()] = true;
    // prevent page from scrolling when hitting Space
    if(e.code === 'Space') e.preventDefault();
  });
  window.addEventListener('keyup', (e)=>{ keys[e.key.toLowerCase()] = false; });

  // toggle shop with B
  window.addEventListener('keydown', (e)=>{
    if(e.key.toLowerCase() === 'b'){
      shopOpen = !shopOpen;
      // when opening shop, clear input buffer for safety
      if(shopOpen){ for(const k in keys) keys[k]=false; }
    }
  });

  // === Projectiles ===
  const projectiles = [];
  function shoot(){
    // legacy keyboard shoot: shoot in facing direction with modest speed
    const cx = player.x + player.w/2, cy = player.y + player.h/2;
    const angle = player.facing>0 ? 0 : Math.PI;
    const speed = 5.5;
    const p = { x: cx, y: cy, w:3, h:3, dx: Math.cos(angle)*speed, dy: Math.sin(angle)*speed, ttl: 120, dmg: 1926 };
    projectiles.push(p);
    try{ playSound('shoot'); }catch(e){}
  }
  // shoot toward a target position (used by mouse/right-click)
  function shootAt(mx, my){
    const cx = player.x + player.w/2, cy = player.y + player.h/2;
    const dirx = mx - cx, diry = my - cy; const m = Math.hypot(dirx, diry) || 1;
    const speed = 6.2;
    const p = { x: cx, y: cy, w:3, h:3, dx: (dirx/m)*speed, dy: (diry/m)*speed, ttl: 160, dmg: 1926 };
    projectiles.push(p);
    try{ playSound('shoot'); }catch(e){}
  }
  // mouse punch action: immediate short-range hit toward facing direction (right-click)
  function doMousePunch(mx, my){
    const range = 28;
    const hx = player.facing>0 ? player.x + player.w : player.x - range;
    const hy = player.y + 6;
    const hb = { x: hx, y: hy, w: range, h: player.h - 10 };
    // visual
    punchFlashTimer = 8;
    try{ playSound('attack'); }catch(e){}
    // apply damage to enemies in hitbox
    for(let i=enemies.length-1;i>=0;i--){ const e = enemies[i]; if(rectsOverlap(hb, e)){
        const dmg = 1926;
        e.hp -= dmg; e.flash = 12; e.x += (player.facing>0? 10 : -10);
        try{ playSound('hit'); }catch(ex){}
        if(e.hp<=0){ enemyKilledAt(e.x + e.w/2, e.y + e.h/2); enemies.splice(i,1); }
      } }
  }
  // mouse controls state
  let mouseX = W/2, mouseY = H/2;
  let punchCooldown = 0; // frames
  let shootCooldown = 0; // frames
  let punchFlashTimer = 0; // visual effect
  let fireCooldown = 0;

  // === Enemies ===
  const enemies = [];
  function spawnEnemy(){
    const side = Math.floor(Math.random()*4);
    let x,y; const size = 14; // enemy spawns just outside screen
    if(side===0){ x = -size; y = Math.random()*(H-size); }
    else if(side===1){ x = W + size; y = Math.random()*(H-size); }
    else if(side===2){ x = Math.random()*(W-size); y = -size; }
    else { x = Math.random()*(W-size); y = H+size; }
  // Small pixel dog: size 12x12 (fits requirement). We scale stats smoothly with totalKills
  // enemy base speed: reduced so player is noticeably faster
  const baseSpeed = 0.25 + Math.random()*0.35; // baseline so early enemies are slower (0.25-0.6)
    const baseHp = 14 + Math.floor(Math.random()*10); // baseline HP around ~14-24
    const baseDmg = 6 + Math.floor(Math.random()*6);

    const df = computeDifficulty();
    // scale multipliers (smooth). Tune these to keep growth fair.
    const speedMultiplier = 1 + df.scale * 0.9; // base scale from totalKills
    const hpMultiplier = 1 + df.scale * 1.6;
    const dmgAdder = Math.round(df.scale * 10);

    // apply per-level multipliers from LEVELS data
    const lvlData = LEVELS[level] || LEVELS[1];
    const lvlSpeedMul = lvlData.enemySpeedMultiplier || 1;
    const lvlHpMul = lvlData.enemyHealthMultiplier || 1;
    const lvlDmgMul = lvlData.enemyDamageMultiplier || 1;

  // apply global slowdown factor so enemies remain clearly slower than player
  let finalSpeed = baseSpeed * speedMultiplier * lvlSpeedMul * 0.62; // tuned slowdown multiplier
  finalSpeed = clamp(finalSpeed, 0.18, 1.25);

  let finalHp = Math.max(6, Math.round(baseHp * hpMultiplier * lvlHpMul));
    finalHp = Math.min(finalHp, 240); // cap HP higher for later levels

  // apply damage multipliers
  let finalDmg = Math.max(3, Math.round((baseDmg + dmgAdder) * lvlDmgMul));
  finalDmg = Math.min(finalDmg, 96);

    const e = {
      x, y,
      w:12, h:12,
      speed: finalSpeed,
      vx: 0, vy: 0, // for smooth movement lerp
      reaction: 6 + Math.floor(Math.random()*10), // small reaction delay before they start moving
      preAttackDelay: 0,
      hp: finalHp,
      hitCooldown:0,
      flash:0,
      attackState: 'idle', // idle | telegraph
      telegraph:0,
      // telegraph flags
      isTelegraphing: false,
      telegraphTimer: 0,
      attackCooldown: 0,
      attackRange: 16,
      attackDmg: finalDmg,
      id: Math.random(),
    };
    enemies.push(e);
  }
  let spawnTimer = 0; let spawnInterval = 180; let maxEnemies = 6; let frame = 0;

  // Kill tracking and level progression
  let totalKills = 0;        // total kills across the whole run (difficulty scaling)
  let levelKills = 0;        // kills in the current level (for level goals)

  // Structured level data for progression (levels 1..10)
  const LEVELS = [
    null,
    { level:1, name: 'City Streets', killGoal:10, difficulty:'Easy', rewardCoins:10, rewardHeal:12, enemySpeedMultiplier:1.0, enemyHealthMultiplier:1.0, enemyDamageMultiplier:1.0, spawnInterval:200, bossEnabled:true },
    { level:2, name: 'Mall', killGoal:15, difficulty:'Easy', rewardCoins:12, rewardHeal:12, enemySpeedMultiplier:1.08, enemyHealthMultiplier:1.05, enemyDamageMultiplier:1.04, spawnInterval:180, bossEnabled:true },
    { level:3, name: 'Farm', killGoal:20, difficulty:'Easy-Medium', rewardCoins:15, rewardHeal:14, enemySpeedMultiplier:1.12, enemyHealthMultiplier:1.12, enemyDamageMultiplier:1.06, spawnInterval:170, bossEnabled:true },
    { level:4, name: 'Factory Zone', killGoal:25, difficulty:'Medium', rewardCoins:18, rewardHeal:18, enemySpeedMultiplier:1.18, enemyHealthMultiplier:1.18, enemyDamageMultiplier:1.12, spawnInterval:150, bossEnabled:true },
    { level:5, name: 'Rooftops', killGoal:30, difficulty:'Medium', rewardCoins:20, rewardHeal:18, enemySpeedMultiplier:1.24, enemyHealthMultiplier:1.25, enemyDamageMultiplier:1.18, spawnInterval:140, bossEnabled:true },
    { level:6, name: 'Night Highway', killGoal:35, difficulty:'Medium-Hard', rewardCoins:22, rewardHeal:20, enemySpeedMultiplier:1.28, enemyHealthMultiplier:1.32, enemyDamageMultiplier:1.22, spawnInterval:130, bossEnabled:true },
    { level:7, name: 'Harbor Docks', killGoal:40, difficulty:'Hard', rewardCoins:25, rewardHeal:20, enemySpeedMultiplier:1.34, enemyHealthMultiplier:1.45, enemyDamageMultiplier:1.3, spawnInterval:120, bossEnabled:true },
    { level:8, name: 'Power Plant', killGoal:45, difficulty:'Hard', rewardCoins:30, rewardHeal:26, enemySpeedMultiplier:1.42, enemyHealthMultiplier:1.55, enemyDamageMultiplier:1.38, spawnInterval:110, bossEnabled:true },
    { level:9, name: 'Dark Fortress', killGoal:50, difficulty:'Hard', rewardCoins:35, rewardHeal:30, enemySpeedMultiplier:1.5, enemyHealthMultiplier:1.7, enemyDamageMultiplier:1.5, spawnInterval:100, bossEnabled:true },
    { level:10, name: 'Final Showdown', killGoal:60, difficulty:'Very Hard', rewardCoins:0, rewardHeal:0, enemySpeedMultiplier:1.6, enemyHealthMultiplier:2.0, enemyDamageMultiplier:1.8, spawnInterval:90, bossEnabled:true }
  ];

  // current level index and UI messages
  let level = 1;
  let levelMessageTimer = 0; // show transition text
  let levelMsgText = '';
  // boss flags for per-level flow
  let bossSpawnedForLevel = false;
  let bossDefeatedForLevel = false;
  // boss state
  let boss = null; // null or boss object
  let bossIntroTimer = 0; // pause and show 'BOSS FIGHT'
  let bossMessageTimer = 0;
  // boss helper systems
  let bossZones = []; // lingering damaging areas left by boss attacks
  let bossPhaseMsgTimer = 0;
  let bossPhaseMsgText = '';

  // Difficulty helpers — smooth scaling based on totalKills
  function computeDifficulty(){
    // scale in [0,1] for smooth increases; use totalKills to determine progression
    const scale = clamp(totalKills / 80, 0, 1);
    let label = 'Easy';
    if(totalKills > 50) label = 'Hard';
    else if(totalKills > 20) label = 'Medium';
    return { label, scale };
  }

  // === Audio / SFX (lightweight WebAudio) ===
  let audioCtx = null;
  const lastPlay = { hit:0, coin:0, attack:0, shoot:0, playerHit:0 };
  function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; } } }
  function playSound(type){
    const now = performance.now();
    const mins = { hit:40, coin:80, attack:60, shoot:60, playerHit:160 };
    const min = mins[type] || 40;
    if(lastPlay[type] && (now - lastPlay[type]) < min) return;
    lastPlay[type] = now;
    ensureAudio();
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t0 = audioCtx.currentTime;
    if(type === 'coin'){
      o.type = 'sine'; o.frequency.setValueAtTime(980, t0);
      o.frequency.exponentialRampToValueAtTime(520, t0 + 0.12);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.18, t0 + 0.002);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
      o.start(t0); o.stop(t0 + 0.20);
    } else if(type === 'hit' || type === 'playerHit'){
      o.type = 'square'; o.frequency.setValueAtTime(type==='playerHit'? 220 : 560, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.25, t0 + 0.001);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
      o.start(t0); o.stop(t0 + 0.14);
    } else if(type === 'attack' || type === 'shoot'){
      o.type = 'triangle'; o.frequency.setValueAtTime(type==='attack'? 320 : 720, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.18, t0 + 0.002);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
      o.start(t0); o.stop(t0 + 0.14);
    } else {
      o.type = 'sine'; o.frequency.setValueAtTime(600, t0);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.14, t0 + 0.002);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
      o.start(t0); o.stop(t0 + 0.12);
    }
  }

  // Pause / Game Over states
  let paused = false;
  let gameOver = false;
  // Game state: 'start' | 'playing' | 'paused' | 'gameover'
  let gameState = 'start';

  // start-screen animation timers
  let startFrame = 0;
  let titleSparkle = 0;
  let bearWavePhase = 0;
  let speechBounce = 0;
  let startBlink = 0;

  // === Shop system ===
  let shopOpen = false;
  // Skin system: track unlocked/equipped skins (persist optional)
  const SKIN_CAPTAIN = 'captain_panda';
  const SKIN_DEFAULT = 'default';
  let unlockedSkins = {};
  let equippedSkin = SKIN_DEFAULT;

  function loadSkins(){
    try{
      const raw = localStorage.getItem('superbear_skins_v1');
      if(raw){ const data = JSON.parse(raw); unlockedSkins = data.unlocked || {}; equippedSkin = data.equipped || SKIN_DEFAULT; }
      else { unlockedSkins = {}; unlockedSkins[SKIN_DEFAULT] = true; equippedSkin = SKIN_DEFAULT; }
    }catch(e){ unlockedSkins = {}; unlockedSkins[SKIN_DEFAULT] = true; equippedSkin = SKIN_DEFAULT; }
  }
  function saveSkins(){
    try{ localStorage.setItem('superbear_skins_v1', JSON.stringify({ unlocked: unlockedSkins, equipped: equippedSkin })); }catch(e){}
  }
  // initialize
  loadSkins();
  // NOTE: `equippedSkin` is the single source-of-truth for appearance.
  // We intentionally do not maintain a separate `currentSkin` that can
  // be changed outside the shop. Removing the automatic/currentSkin
  // syncing prevents accidental skin changes. Use the shop (B) to
  // permanently equip a skin.
  // S key cooldown (frames) to prevent spam
  let sCooldown = 0;
  // skin switch message display
  let skinMsgTimer = 0; let skinMsgText = '';
  // brief flash animation when switching skins
  let skinSwitchFlash = 0;
  // shop items: cost, level, and effect applied on purchase
  const shopItems = {
    attack: { name: 'Attack', cost: 5, level: 0, maxLevel: 10, apply(){ player.attackBonus += 2; } },
    speed: { name: 'Speed', cost: 8, level: 0, maxLevel: 6, apply(){ player.speedBonus += 0.28; } },
    health: { name: 'Health', cost: 10, level: 0, maxLevel: 6, apply(){ player.maxHealth += 12; player.health = Math.min(player.maxHealth, player.health + 12); } }
  };

  // Skin shop entry (cost and id)
  const shopSkins = [ { id: SKIN_CAPTAIN, name: 'Captain Panda', cost: 25 } ];

  // === Coins ===
  const coins = [];
  let coinCount = 0;
  // magnet pickup settings
  const COIN_MAGNET_RADIUS = 48; // pixels
  const COIN_MAGNET_FORCE = 0.26; // acceleration per frame toward player
  const COIN_AUTO_PICK_DISTANCE = 10; // when coin is this close, auto-collect
  // simple particles for coin pickup burst
  const coinParticles = [];

  // dodge afterimages
  const dodgeTrail = [];

  // Dodge tuning constants (frames at ~60fps)
  const DODGE_DURATION = 14; // how long dodge moves (frames)
  const DODGE_SPEED = 6.4; // pixels per frame during dodge burst
  const DODGE_COOLDOWN = 48; // cooldown frames before next dodge

  function spawnCoinParticle(x, y){
    const p = {
      x: x,
      y: y,
      vx: (Math.random()-0.5) * 1.8,
      vy: - (Math.random()*1.6 + 0.6),
      life: 18 + Math.floor(Math.random()*8),
      ttl: 18 + Math.floor(Math.random()*8),
      size: 1 + Math.floor(Math.random()*2),
      color: Math.random() < 0.6 ? '#fff9d6' : '#ffd24a'
    };
    coinParticles.push(p);
  }

  // === Level celebration / transition system ===
  let inCelebration = false;
  let celebrationTimer = 0;
  const CELEBRATION_DURATION = 180; // frames (~3s)
  const confetti = [];
  let victoryMsg = '';
  let rewardMsg = '';
  let rewardTimer = 0;
  let screenFlash = 0;

  function randColor(){ const cols = ['#ffd24a','#ff6b6b','#6bf0ff','#9bff7a','#ff9bd6','#ffd9a6']; return cols[Math.floor(Math.random()*cols.length)]; }

  function spawnConfettiBurst(count){
    // count: number of confetti particles to spawn (scaled by level)
    count = count || 140;
    // scale per-particle velocity/size slightly when count is large for more dramatic effect
    const sizeBoost = Math.min(2, Math.floor(count / 160));
    for(let i=0;i<count;i++){
      confetti.push({ x: Math.random()*W, y: Math.random()*H*0.3, vx: (Math.random()-0.5)*(3.6 + sizeBoost*0.8), vy: Math.random()*(1.6 + sizeBoost*0.6) + 0.6, color: randColor(), ttl: 60 + Math.floor(Math.random()*60) + sizeBoost*20, size: 1 + Math.floor(Math.random()*2) + sizeBoost });
    }
  }

  function updateCelebration(){
    // update confetti particles
    for(let i=confetti.length-1;i>=0;i--){ const p = confetti[i]; p.vy += 0.06; p.x += p.vx; p.y += p.vy; p.ttl--; if(p.ttl<=0 || p.y > H + 8) confetti.splice(i,1); }
    // update coin particles so they continue to animate
    for(let i=coinParticles.length-1;i>=0;i--){ const p = coinParticles[i]; p.vy += 0.18; p.x += p.vx; p.y += p.vy; p.life--; if(p.life<=0) coinParticles.splice(i,1); }
    if(rewardTimer>0) rewardTimer--; if(screenFlash>0) screenFlash--; if(skinMsgTimer>0) skinMsgTimer--; if(sCooldown>0) sCooldown--; if(skinSwitchFlash>0) skinSwitchFlash--;
  }

  function startLevelCelebration(newLevel){
    // scale celebration strength with level number
    inCelebration = true;
    const lvl = Math.max(1, Math.floor(newLevel || level));
    // multiplier increases noticeably per level (tweak factor to taste)
    const mult = 1 + (lvl - 1) * 0.6; // level1=1.0, level2=1.6, level3=2.2, ...

    // duration scales with level (but keep reasonable cap)
    celebrationTimer = Math.min(720, Math.round(CELEBRATION_DURATION * mult));

    // confetti amount scales
    confetti.length = 0; spawnConfettiBurst(Math.round(140 * mult));

    // Spawn a coins burst that will auto-collect to the player visually (scale count)
    const coinBurst = Math.round(12 * mult);
    for(let i=0;i<coinBurst;i++){
      spawnCoin(player.x + player.w/2 + (Math.random()-0.5)*64, player.y + player.h/2 + (Math.random()-0.5)*64);
      const c = coins[coins.length-1]; if(c){ c.collected = true; c.collectTimer = 2 + Math.floor(Math.random()*8); }
    }

    // reward the player (scaled but not insane)
    const bonus = Math.round(10 * mult);
    coinCount += bonus;

    // scaled heal (cap to reasonable amount)
    const maxHeal = Math.round(20 * mult);
    const heal = Math.min(maxHeal, player.maxHealth - player.health);
    if(heal > 0) player.health += heal;

    // temporary shield (invuln) scales with level
    player.invuln = Math.max(player.invuln || 0, Math.round(180 * mult));

    // celebratory shake stronger at higher levels
    shake = Math.max(shake, Math.round(10 * mult));

    // messages and flash (scaled timers/intensity)
    rewardMsg = '+' + bonus + ' COINS'; rewardTimer = Math.round(160 * mult);
    victoryMsg = 'LEVEL COMPLETE!';
    screenFlash = Math.min(120, Math.round(18 * mult));
    try{ playSound('coin'); }catch(e){}
  }

  function spawnCoin(cx, cy){
    const size = 5; // 4-6 pixels
    // clamp x so coin is on screen
    const x = clamp(Math.round(cx - size/2), 4, W - size - 4);
    const baseY = H - GROUND_H - size - 1;
    // spawn slightly above death point, give a pop (negative vy) and spawnBounces for small landing bounce
    const coin = {
      x: x,
      y: Math.round(cy) - 10, // start a bit higher
      baseY: baseY,
      w: size, h: size,
      vx: (Math.random()-0.5)*0.8,
      vy: -3.0 + Math.random()*-0.6, // stronger pop
      gravity: 0.28,
      landed: false,
      spawnTimer: 0,
      spawnBounces: 1 + (Math.random() < 0.25 ? 1 : 0), // 1 or sometimes 2 small bounces
      bouncePower: 5 + Math.random()*2,
      animFrame: Math.floor(Math.random()*30),
      collected: false,
      collectTimer: 0,
      scale: 1,
      spinPhase: Math.random() < 0.5 ? 0 : 1 // fake spin state (0 or 1)
    };
    coins.push(coin);
  }

  // === Background / Buildings (pixel-style) ===
  const buildings = [];
  function initBuildings(){
    // All positions are pixel-aligned integers
    // Left building (small)
    buildings.push(createBuilding(20, H - 60, 40, 48, '#454a55', 3, 4));

  function createBuilding(x, topY, w, h, color, cols, rows){
    // topY is y-position of top of building

      for(let c=0;c<cols;c++) row.push(Math.random() < 0.5);
      win.push(row);
    }
    return { x: Math.round(x), y: Math.round(topY), w: Math.round(w), h: Math.round(h), color, cols, rows, windows: win, flick: 0 };

  // === Melee combo system ===

    { name:'Punch II', dmg:12, duration:16, range:22, knock:4, color:'#ffd06a', hitStart:3, hitEnd:7 },
    { name:'Heavy', dmg:22, duration:26, range:28, knock:12, color:'#ff8a8a', hitStart:6, hitEnd:12 }

  let attackTimer = 0; // frames left for current attack
  let comboTimer = 0; // frames left to input next within window
  const comboWindow = 36; // frames allowed between hits (~600ms)
  let queuedNext = false; // whether next input was queued during current swing
  let currentHitRecords = null; // set to track enemies hit this swing

  let hitStop = 0; let shake = 0; let shakeX = 0, shakeY = 0;

  window.addEventListener('keydown', (e)=>{

      // If not in combo, start first if not locked
      if(comboStep===0 && attackTimer<=0){ startAttack(1); }
      else if(comboStep>0 && comboTimer>0 && comboStep<3){
        // if currently mid-swing, queue next; otherwise start it immediately
        if(attackTimer>0) queuedNext = true; else startAttack(comboStep+1);
      }
    }
  });

  function startAttack(step){
    comboStep = step;
    attackTimer = melee[step].duration;
    // set comboTimer to allow next input after this swing (slightly larger than window)
    comboTimer = comboWindow;
    queuedNext = false;
    currentHitRecords = new Set();
    comboIndicatorTimer = comboWindow;
    try{ playSound('attack'); }catch(e){}
  }

  // === Collisions ===
  function rectsOverlap(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

  // === Game update ===
  function update(){
    // If we're on the start screen, only progress start-screen timers/animation and skip game logic
    if(gameState === 'start'){

  if(punchCooldown > 0) punchCooldown--;

  if(punchFlashTimer > 0) punchFlashTimer--;
      return;
    }

    if(hitStop>0){ hitStop--; if(hitStop>0){ // still paused
      // decrement some timers but skip movement

      if(attackTimer>0) attackTimer--;

    }}

    if(shopOpen){

      if(attackTimer>0) attackTimer--;

  // level message timer
  if(levelMessageTimer > 0) levelMessageTimer--;

    // dodge cooldown decrement

  // decrement mouse attack cooldowns

    // dodge movement (short burst overriding normal movement)

      for(let j=enemies.length-1;j>=0;j--){ const e = enemies[j]; if(rectsOverlap(p, e)){

    console.log('startGame() called');
    restartGame();
    gameState = 'playing';
  }

  // Draw the start/title screen (large bear, simple buildings, blinking prompt)
  function drawStartScreen(){
    // sky/ground
    ctx.save();
    ctx.fillStyle = '#071018'; ctx.fillRect(0,0,W,H);
    // draw a few simple buildings (pixel blocks)
    const baseY = H - 36;
    ctx.fillStyle = '#0b1722'; ctx.fillRect(30, baseY - 40, 44, 40);
    ctx.fillStyle = '#0f2430'; ctx.fillRect(90, baseY - 52, 34, 52);
    ctx.fillStyle = '#0b1626'; ctx.fillRect(140, baseY - 36, 56, 36);
    // windows (flicker)
    ctx.fillStyle = '#123'; for(let bx of [34,98,144]){ for(let wy=baseY-32; wy<baseY-4; wy+=8){ if(Math.random() < 0.25) ctx.fillRect(bx, wy, 4,4); } }
    // ground strip
    ctx.fillStyle = '#051018'; ctx.fillRect(0, baseY, W, H-baseY);

    // Title
    drawCenteredText('SUPER BEAR', Math.round(W/2), 28, { font: '22px monospace', bg: true, color: '#ffd24a' });

    // big bear: scale up the existing small bear drawing for charm
    const scale = 2.0;
    const bx = Math.round(W/2 - (player.w * scale) / 2);
    const by = Math.round(H/2 - (player.h * scale) / 2) - 6 + Math.round(Math.sin(startFrame * 0.06) * 3);
    ctx.translate(bx, by);
    ctx.scale(scale, scale);
    // slightly bob and nudge to create a waving feel
    drawBear(0, 0 + Math.round(Math.sin(bearWavePhase) * 1), 1, false);
    ctx.setTransform(1,0,0,1,0,0);

    // speech bubble
    const sx = Math.round(W/2 + 24);
    const sy = Math.round(H/2 - 24 + speechBounce);
    // bubble rectangle
    ctx.fillStyle = '#ffffff'; ctx.fillRect(sx, sy, 44, 16);
    ctx.fillStyle = '#000000'; ctx.fillRect(sx+2, sy+2, 40, 12);
    drawOutlinedText('HIIIII', sx + 22, sy + 8, { font: '10px monospace', align: 'center', baseline: 'middle', color: '#ffd24a' });

    // blinking prompt
    if(startBlink){ drawCenteredText('Press Enter to Start', Math.round(W/2), Math.round(H - 24), { font: '12px monospace', bg: false }); }

    ctx.restore();
  }

  function restartGame(){
    // reset core state
    console.log('restartGame()');
    player.baseSpeed = 1.7; player.speedBonus = 0; player.attackBonus = 0; player.maxHealth = 100; player.health = 100;
    player.x = W/2 - 10; player.y = H/2 - 12; player.facing = 1; player.invuln = 0;
    // reset shop
    shopItems.attack.level = 0; shopItems.attack.cost = 5;
    shopItems.speed.level = 0; shopItems.speed.cost = 8;
    shopItems.health.level = 0; shopItems.health.cost = 10;
    // clear world
    enemies.length = 0; projectiles.length = 0; coins.length = 0; coinParticles.length = 0;
    boss = null; bossMessageTimer = 0; bossIntroTimer = 0;
    coinCount = 0; totalKills = 0; levelKills = 0; bossSpawnedForLevel = false; bossDefeatedForLevel = false; spawnTimer = 0; frame = 0;
    // apply starting level settings
    level = 1; applyLevelSettings(level);
    shopOpen = false; paused = false; gameOver = false;
    initBuildings(); spawnEnemy(); spawnEnemy();
  }

  // Apply settings for a given level (spawn interval, max enemies, UI text)
  function applyLevelSettings(levelIndex){
    const lvl = LEVELS[levelIndex] || LEVELS[1];
    spawnInterval = Math.max(60, Math.round(lvl.spawnInterval));
    // set maxEnemies scaled by level difficulty
    maxEnemies = Math.min(18, 4 + Math.floor(levelIndex * 1.2));
    levelMsgText = 'LEVEL ' + levelIndex + ': ' + (lvl.name || '');
    levelMessageTimer = 140;
    // reset per-level counters
    levelKills = 0; bossSpawnedForLevel = false; bossDefeatedForLevel = false;
    // small respawn pause so player has breathing room
    enemies.length = 0; spawnTimer = -180;
  }

  // handle completing a level (rewards, celebration, advance to next level or victory)
  function completeLevel(){
    const cur = LEVELS[level] || LEVELS[1];
    // award reward (but level 10 is handled separately)
    if(level < 10){
      coinCount += cur.rewardCoins || 0;
      const heal = Math.min(cur.rewardHeal || 0, player.maxHealth - player.health);
      if(heal > 0) player.health += heal;
      // Prepare next level
      const next = level + 1;
      level = next;
      applyLevelSettings(level);
      // start a celebration for the new level (stronger as level grows)
      startLevelCelebration(level);
    } else {
      // final completion -> show victory
      // small reward and then show victory screen
      coinCount += cur.rewardCoins || 0;
      showVictoryScreen();
    }
  }

  function showVictoryScreen(){
    // stop gameplay and show final victory info
    gameState = 'victory';
    // prepare celebratory state
    inCelebration = false; celebrationTimer = 0; confetti.length = 0;
    // clear world and keep stats visible
    enemies.length = 0; projectiles.length = 0; coins.length = 0;
  }
  }
  }
  </script>
